name: Gemini Assistant
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  aider:
    if: >
      (github.actor == 'adamecker' || github.actor == 'rascalsbargrill') &&
      (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'assistant') ||
        (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'assistant'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider and LiteLLM Proxy
        run: |
          pipx install aider-chat
          pipx install 'litellm[proxy]'

      - name: Configure Git Credentials
        run: |
          git config --global user.name "Gemini Assistant"
          git config --global user.email "assistant@rascals.bar"

      - name: Checkout Existing PR Branch
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            echo "Existing PR branch found. Checking it out..."
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
          else
            echo "No existing PR branch found. Creating new branch..."
            git checkout -b $BRANCH_NAME
          fi

      - name: Gather Issue Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          ISSUE_JSON=$(gh issue view ${{ github.event.issue.number }} --json title,body,comments)
          TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          BODY=$(echo "$ISSUE_JSON" | jq -r '.body')
          COMMENTS=$(echo "$ISSUE_JSON" | jq -r '.comments[].body' | paste -sd "\n\n" -)
          
          # Removed single quotes around EOF to allow bash variable expansion
          cat << EOF > issue_context.txt
          Title: $TITLE
          Original Request: $BODY
          
          Follow-up Comments & Corrections:
          $COMMENTS
          EOF

      - name: Generate LiteLLM Proxy Config
        run: |
          cat << 'EOF' > litellm_config.yaml
          model_list:
            - model_name: gemini/gemini-2.5-flash
              litellm_params:
                model: gemini/gemini-2.5-flash
                api_key: os.environ/GEMINI_API_KEY
                rpm: 15
          EOF

      - name: Start LiteLLM Proxy in Background
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          litellm --config litellm_config.yaml --detailed_debug > proxy.log 2>&1 &
          sleep 5

      - name: Run Aider via Proxy
        env:
          OPENAI_API_KEY: "dummy-key"
          OPENAI_API_BASE: "http://0.0.0.0:4000"
          OPENAI_TIMEOUT: "600"
        run: |
          ISSUE_TEXT=$(cat issue_context.txt)
          
          echo "Starting Aider execution via LiteLLM proxy..."
          aider \
            --model openai/gemini/gemini-2.5-flash \
            --editor-model openai/gemini/gemini-2.5-flash \
            --yes \
            --verbose \
            --message "$ISSUE_TEXT"

      - name: Print Proxy Logs (On Failure)
        if: failure()
        run: cat proxy.log

      - name: Push Commits and Create PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          
          # 1. Push Aider's native local commits directly to the remote branch
          git push origin HEAD:$BRANCH_NAME
          
          # 2. Use the GitHub CLI to open a PR (it will harmlessly skip if the PR already exists)
          gh pr create \
            --title "Update from Gemini: ${{ github.event.issue.title }}" \
            --body "This PR was automatically generated and updated by the Gemini Assistant. Closes #${{ github.event.issue.number }}" \
            --base main \
            --head $BRANCH_NAME || echo "PR already exists, branch successfully updated."
