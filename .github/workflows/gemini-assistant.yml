name: Gemini Assistant
on:
  issues:
    types: [labeled]

jobs:
  aider:
    if: contains(github.event.issue.labels.*.name, 'assistant')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          git config --global user.name "Gemini Assistant"
          git config --global user.email "assistant@rascals.bar"
          
          # We "prime" Aider by telling it exactly which files might contain the answer.
          # This prevents it from just editing the .gitignore file.
          aider --model gemini/gemini-1.5-flash \
                --yes \
                --message "$ISSUE_TEXT" \
                src/data/site.json \
                src/pages/index.astro \
                src/pages/specials.astro \
                src/data/pages.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Gemini Assistant: Updated files based on Issue #${{ github.event.issue.number }}"
          title: "Update from Gemini: ${{ github.event.issue.title }}"
          body: "This PR was automatically generated by the Gemini Assistant in response to Issue #${{ github.event.issue.number }}."
          branch: "assistant-update-${{ github.event.issue.number }}"
          delete-branch: true