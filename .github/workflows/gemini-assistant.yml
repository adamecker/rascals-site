name: Gemini Assistant
on:
  issues:
    types: [labeled]

jobs:
  aider:
    if: contains(github.event.issue.labels.*.name, 'assistant')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
        run: |
          git config --global user.name "Gemini Assistant"
          git config --global user.email "assistant@rascals.bar"
          
          # Optimizations added:
          # --no-gitignore: Stops the robot from modifying your repo's .gitignore file every run
          # --map-tokens 1024: Enforces a strict, compact context window for structural scanning
          aider --model gemini/gemini-2.5-flash \
                --editor-model gemini/gemini-2.5-flash \
                --no-gitignore \
                --yes \
                --map-tokens 1024 \
                --message "$ISSUE_TEXT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Gemini Assistant: Handled content update requests"
          # Fixed the variable parsing syntax so issue numbers display correctly
          title: "Update from Gemini: ${{ github.event.issue.title }}"
          body: |
            This PR was automatically generated by the Gemini Assistant.
            
            Closes #${{ github.event.issue.number }}
          branch: "assistant-update-${{ github.event.issue.number }}"
          delete-branch: true
