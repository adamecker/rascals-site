name: Gemini Assistant
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  aider:
    if: >
      (github.actor == 'adamecker' || github.actor == 'rascalsbargrill') &&
      (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'assistant') ||
        (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'assistant'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: pipx install aider-chat

      - name: Configure Git Credentials
        run: |
          git config --global user.name "Gemini Assistant"
          git config --global user.email "assistant@rascals.bar"

      - name: Checkout Existing PR Branch
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            echo "Existing PR branch found. Checking it out..."
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
          else
            echo "No existing PR branch found. Creating new branch..."
            git checkout -b $BRANCH_NAME
          fi

      - name: Gather Issue Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Fetch the issue payload in one API call
          ISSUE_JSON=$(gh issue view ${{ github.event.issue.number }} --json title,body,comments)
          
          # Extract the pieces
          TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          BODY=$(echo "$ISSUE_JSON" | jq -r '.body')
          LATEST_COMMENT=$(echo "$ISSUE_JSON" | jq -r '.comments[-1].body // "No comments available."')
          
          # Build a clean context file for Aider
          cat << EOF > issue_context.txt
          Please resolve the following GitHub Issue.
          
          ISSUE TITLE:
          $TITLE
          
          ISSUE DESCRIPTION:
          $BODY
          
          LATEST INSTRUCTION / ACTION REQUIRED:
          $LATEST_COMMENT
          
          CURRENT PR BRANCH DIFF (Changes already made vs main):
          EOF
          
          # Append the actual git diff so Gemini knows what was already changed
          echo '```diff' >> issue_context.txt
          git diff origin/main...HEAD >> issue_context.txt || true
          echo '```' >> issue_context.txt
          
          echo "Context successfully gathered:"
          cat issue_context.txt

      - name: Run Aider Natively
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Force the native client to retry enough times to outlast the 60s quota window
          LITELLM_NUM_RETRIES: "10"
        run: |
          ISSUE_TEXT=$(cat issue_context.txt)
          
          echo "Starting Aider..."
          aider \
            --model gemini/gemini-3.5-flash \
            --yes \
            --verbose \
            --no-auto-commits \
            --message "$ISSUE_TEXT"

      - name: Push Commits and Create PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          
          # CLEANUP: Delete temporary text file so it doesn't get committed to your repo
          rm -f issue_context.txt
          
          git add .
          git commit -m "Assistant update: ${{ github.event.issue.title }}" || echo "No changes to commit"
          git push origin HEAD:$BRANCH_NAME
          
          gh pr create \
            --title "Update from Gemini: ${{ github.event.issue.title }}" \
            --body "This PR was automatically generated and updated by the Gemini Assistant. Closes #${{ github.event.issue.number }}" \
            --base main \
            --head $BRANCH_NAME || echo "PR already exists, branch successfully updated."
