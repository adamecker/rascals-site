name: Gemini Assistant
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  aider:
    if: >
      (github.actor == 'adamecker' || github.actor == 'rascalsbargrill') &&
      (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'assistant') ||
        (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'assistant'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Configure Git Credentials
        run: |
          git config --global user.name "Gemini Assistant"
          git config --global user.email "assistant@rascals.bar"

      - name: Checkout Existing PR Branch
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            echo "Existing PR branch found. Checking it out..."
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
          else
            echo "No existing PR branch. Starting fresh on main."
            git checkout main
          fi

      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          
          ISSUE_TEXT: |
            Context (Original Request):
            ${{ github.event.issue.body }}
            
            NEWEST INSTRUCTION TO APPLY NOW:
            ${{ github.event.comment.body || 'Execute the original request.' }}
        run: |
          MAX_RETRIES=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
            echo "========================================================"
            echo "Running Aider (Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES)..."
            echo "========================================================"
            
            # Run Aider and pipe the output to a text file while also printing it to the console
            aider --model gemini/gemini-2.5-flash \
                  --editor-model gemini/gemini-2.5-flash \
                  --no-gitignore \
                  --yes \
                  --map-tokens 1024 \
                  --message "$ISSUE_TEXT" 2>&1 | tee aider_output.txt
            
            # Read the output to see if Aider gave up due to the rate limit
            if grep -q "The API provider has rate limited you" aider_output.txt || grep -q "litellm.RateLimitError" aider_output.txt; then
              echo ""
              echo "⚠️ Aider hit the Gemini Free Tier Rate Limit and gave up."
              echo "💤 Sleeping for 65 seconds to completely clear the 1-minute quota window..."
              sleep 65
              RETRY_COUNT=$((RETRY_COUNT + 1))
            else
              echo ""
              echo "✅ Aider completed the task without hitting the rate limit wall!"
              break
            fi
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
            echo "❌ Aider failed after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Push Commits and Create PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          
          # 1. Push Aider's native local commits directly to the remote branch
          git push origin HEAD:$BRANCH_NAME
          
          # 2. Use the GitHub CLI to open a PR (it will harmlessly skip if the PR already exists)
          gh pr create \
            --title "Update from Gemini: ${{ github.event.issue.title }}" \
            --body "This PR was automatically generated and updated by the Gemini Assistant. Closes #${{ github.event.issue.number }}" \
            --base main \
            --head $BRANCH_NAME || echo "PR already exists, branch successfully updated."
