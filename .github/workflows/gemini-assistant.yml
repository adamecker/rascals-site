name: Gemini Assistant
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  aider:
    # LOCKDOWN GATE: Only runs if the user is Adam OR the business account, AND 
    # it's either a new 'assistant' label or a comment on an already-labeled issue.
    if: >
      (github.actor == 'adamecker' || github.actor == 'rascalsbargrill') &&
      (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'assistant') ||
        (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'assistant'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          ISSUE_TEXT: |
            Original Request:
            ${{ github.event.issue.body }}
            
            Latest Update:
            ${{ github.event.comment.body }}
        run: |
          git config --global user.name "Gemini Assistant"
          git config --global user.email "assistant@rascals.bar"
          
          aider --model gemini/gemini-2.5-flash \
                --editor-model gemini/gemini-2.5-flash \
                --no-gitignore \
                --yes \
                --map-tokens 1024 \
                --message "$ISSUE_TEXT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Gemini Assistant: Handled content update requests"
          title: "Update from Gemini: ${{ github.event.issue.title }}"
          body: |
            This PR was automatically generated by the Gemini Assistant.
            
            Closes #${{ github.event.issue.number }}
          branch: "assistant-update-${{ github.event.issue.number }}"
          delete-branch: true
