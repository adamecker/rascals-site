name: Gemini Assistant
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  aider:
    if: >
      (github.actor == 'adamecker' || github.actor == 'rascalsbargrill') &&
      (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'assistant') ||
        (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'assistant'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: pipx install aider-chat

      - name: Configure Git Credentials
        run: |
          git config --global user.name "Gemini Assistant"
          git config --global user.email "assistant@rascals.bar"

      - name: Checkout Existing PR Branch
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            echo "Existing PR branch found. Checking it out..."
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
          else
            echo "No existing PR branch found. Creating new branch..."
            git checkout -b $BRANCH_NAME
          fi

      - name: Gather Issue Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          LATEST_COMMENT=$(gh issue view ${{ github.event.issue.number }} --json comments --jq '.comments[-1].body')
          echo "$LATEST_COMMENT" > issue_context.txt

      - name: Start Smart Retry Proxy
        run: |
          cat << 'EOF' > proxy.py
          import time, urllib.request, urllib.error, json
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class SmartProxy(BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  data = self.rfile.read(length)
                  url = "https://generativelanguage.googleapis.com" + self.path
                  
                  req = urllib.request.Request(url, data=data, method='POST')
                  for k, v in self.headers.items():
                      if k.lower() not in ['host']:
                          req.add_header(k, v)
                  
                  max_retries = 6
                  for attempt in range(max_retries):
                      try:
                          resp = urllib.request.urlopen(req)
                          status, headers, body = resp.status, resp.headers, resp.read()
                          break 
                          
                      except urllib.error.HTTPError as e:
                          status, headers, body = e.code, e.headers, e.read()
                          
                          if status == 429:
                              wait_time = 60.0 # Safe fallback
                              try:
                                  # Parse Google's JSON error response
                                  error_json = json.loads(body.decode('utf-8'))
                                  details = error_json.get('error', {}).get('details', [])
                                  
                                  for detail in details:
                                      if detail.get('@type') == 'type.googleapis.com/google.rpc.RetryInfo':
                                          delay_str = detail.get('retryDelay', '')
                                          if delay_str.endswith('s'):
                                              # Converts "36.71s" or "45s" into a float
                                              wait_time = float(delay_str[:-1])
                                              break
                              except Exception as parse_err:
                                  print(f"JSON Parse fallback. Error: {parse_err}")
                              
                              # Add a tiny 0.5s buffer to ensure we clear the exact millisecond threshold
                              wait_time += 0.5 
                              print(f"Google requested wait. Proxy paused for {wait_time}s (Attempt {attempt+1}/{max_retries})")
                              time.sleep(wait_time)
                              continue # Loop around and resend the request natively
                          else:
                              # If it's a 400 or 500 error, pass it back to Aider immediately
                              break

                  self.send_response(status)
                  for k, v in headers.items():
                      self.send_header(k, v)
                  self.end_headers()
                  self.wfile.write(body)

          print("Starting Smart Retry Proxy on port 4000...")
          HTTPServer(('0.0.0.0', 4000), SmartProxy).serve_forever()
          EOF
          
          python3 proxy.py &
          sleep 3

      - name: Run Aider via Smart Proxy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_BASE: "http://0.0.0.0:4000"
        run: |
          ISSUE_TEXT=$(cat issue_context.txt)
          
          echo "Starting Aider..."
          aider \
            --model gemini/gemini-2.5-flash \
            --yes \
            --timeout 600 \
            --message "$ISSUE_TEXT"

      - name: Push Commits and Create PR
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          
          git add .
          git commit -m "Assistant update: ${{ github.event.issue.title }}" || echo "No changes to commit"
          git push origin HEAD:$BRANCH_NAME
          
          gh pr create \
            --title "Update from Gemini: ${{ github.event.issue.title }}" \
            --body "This PR was automatically generated and updated by the Gemini Assistant. Closes #${{ github.event.issue.number }}" \
            --base main \
            --head $BRANCH_NAME || echo "PR already exists, branch successfully updated."
