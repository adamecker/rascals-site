name: Gemini Assistant
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  aider:
    if: >
      (github.actor == 'adamecker' || github.actor == 'rascalsbargrill') &&
      (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'assistant') ||
        (github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'assistant'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Configure Git Credentials
        run: |
          git config --global user.name "Gemini Assistant"
          git config --global user.email "assistant@rascals.bar"

      - name: Checkout Existing PR Branch (Preserve History)
        run: |
          BRANCH_NAME="assistant-update-${{ github.event.issue.number }}"
          # Check if the assistant has already created a branch for this issue
          if git ls-remote --heads origin $BRANCH_NAME | grep -q $BRANCH_NAME; then
            echo "Existing PR branch found. Checking it out to build on top..."
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
          else
            echo "No existing PR branch. Starting fresh on main."
            git checkout main
          fi

      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # This clearly separates context so Aider doesn't get confused 
          # between what it already did and what it needs to do right now.
          ISSUE_TEXT: |
            Context (Original Request):
            ${{ github.event.issue.body }}
            
            NEWEST INSTRUCTION TO APPLY NOW:
            ${{ github.event.comment.body || 'Execute the original request.' }}
        run: |
          aider --model gemini/gemini-2.5-flash \
                --editor-model gemini/gemini-2.5-flash \
                --no-gitignore \
                --yes \
                --map-tokens 1024 \
                --message "$ISSUE_TEXT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "Gemini Assistant: Applied newest feedback"
          title: "Update from Gemini: ${{ github.event.issue.title }}"
          body: |
            This PR was automatically generated and updated by the Gemini Assistant.
            
            Closes #${{ github.event.issue.number }}
          branch: "assistant-update-${{ github.event.issue.number }}"
          delete-branch: true
