name: Gemini Assistant
on:
  issues:
    types: [labeled]

jobs:
  aider:
    if: contains(github.event.issue.labels.*.name, 'assistant')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Aider
        uses: it-praktyk/aider-github-action@main
        with:
          aider_args: "--commit --message '${{ github.event.issue.body }}'"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}